<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BFF Dual View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #000000;
      font-family: 'Outfit', sans-serif;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100%;
      padding: 2%;
      gap: 2%;
    }

    .frame-wrapper {
      flex: 1;
      height: 100%;
      position: relative;
      background-color: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .placeholder-text {
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      font-size: 3.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      user-select: none;
      text-align: center;
      opacity: 0.9;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      outline: none;
      background: #ffffff;
      display: none; /* Hidden until server is verified reachable */
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Left Frame: Snapper -->
    <div class="frame-wrapper">
      <div class="placeholder-text">SNAPPER</div>
      <iframe id="iframe-snapper" data-src="http://snapper.local:8080" title="Snapper"></iframe>
    </div>

    <!-- Right Frame: Helper -->
    <div class="frame-wrapper">
      <div class="placeholder-text">HELPER</div>
      <iframe id="iframe-helper" data-src="http://helper.local:8080" title="Helper"></iframe>
    </div>
  </div>

  <script>
    const TARGETS = [
      { id: 'iframe-snapper', url: 'http://snapper.local:8080' },
      { id: 'iframe-helper', url: 'http://helper.local:8080' }
    ];

    async function checkServer(url) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 2000);
      try {
        await fetch(url, { mode: 'no-cors', cache: 'no-store', signal: controller.signal });
        clearTimeout(timeoutId);
        return true;
      } catch (e) {
        clearTimeout(timeoutId);
        return false;
      }
    }

    async function updateFrame(target) {
      const iframe = document.getElementById(target.id);
      const isReachable = await checkServer(target.url);

      if (isReachable) {
        if (iframe.style.display !== 'block') {
          if (!iframe.src || iframe.src === 'about:blank') {
            iframe.src = target.url;
          }
          iframe.style.display = 'block';
        }
      } else {
        iframe.style.display = 'none';
        iframe.src = 'about:blank';
      }
    }

    function checkAll() {
      TARGETS.forEach(updateFrame);
    }

    // Initial check immediately
    checkAll();

    // Poll status every 3 seconds
    setInterval(checkAll, 3000);
  </script>
</body>
</html>
